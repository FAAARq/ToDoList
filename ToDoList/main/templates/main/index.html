{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>ToDo</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="{% static 'main/css/style.css' %}">
    <link rel="stylesheet" href="https://use.fontawesome.com/releases/v5.8.2/css/all.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="{% static 'main/js/script.js' %}"></script>
</head>
<body>

<header class="navbar">
    <div class="logo"><i class="bi bi-book-fill"></i> To Do List</div>
</header>

<div class="container">
    <form method="post" action="{% url 'create' %}">
        {% csrf_token %}
    <div class="top-bar">
        <h2 >New List: {{ date|date:"Y-m-d" }} <i class="bi bi-pencil"></i></h2>
        <button class="save-btn" type="submit"><i class="bi bi-floppy2-fill"></i> Save</button>
    </div>

        <div class="input-section">
            <input type="text" name="task_text" placeholder="Write your new task here..." >
            <span class="hint">Press enter to add</span>
        </div>
    </form>

    <h3>Pending</h3>
    <form method="post">
        {% if tasks %}
            {% for el in tasks %}
                <div class="task {{ el.color }}" id="task-{{ el.id }}">
                    <input class="form-check-input" type="checkbox" value="" id="flexCheckDefault">
                    <span class="task-text">{{ el.title }}</span>
                    <span class="tag">{{ el.date }}</span>
                    <span>
                        <div class="btn-group" role="group">
                            <button type="button"
                                    class="btn btn-secondary dropdown-toggle"
                                    data-bs-toggle="dropdown"
                                    aria-expanded="false">
                                <i class="bi bi-collection"></i>
                            </button>
                        <div class="dropdown-menu">
                            <a class="dropdown-item d-flex align-items-center color-picker" href="#" data-color="task-blue">
                                <i class="bi bi-circle-fill me-2" style="color: #4a9eff;"></i> Blue
                            </a>
                            <a class="dropdown-item d-flex align-items-center color-picker" href="#" data-color="task-red">
                                <i class="bi bi-circle-fill me-2" style="color: #ff4a4a;"></i> Red
                            </a>
                            <a class="dropdown-item d-flex align-items-center color-picker" href="#" data-color="task-yellow">
                                <i class="bi bi-circle-fill me-2" style="color: #ffd700;"></i> Yellow
                            </a>
                            <a class="dropdown-item d-flex align-items-center color-picker" href="#" data-color="task-green">
                                <i class="bi bi-circle-fill me-2" style="color: #4aff7a;"></i> Green
                            </a>
                            <a class="dropdown-item d-flex align-items-center color-picker" href="#" data-color="task-purple">
                                <i class="bi bi-circle-fill me-2" style="color: #b44aff;"></i> Purple
                            </a>
                            <a class="dropdown-item d-flex align-items-center color-picker" href="#" data-color="task-orange">
                                <i class="bi bi-circle-fill me-2" style="color: #ff8c4a;"></i> Orange
                            </a>
                            <div class="dropdown-divider"></div>
                            <a class="dropdown-item d-flex align-items-center color-picker" href="#" data-color="task-default">
                                <i class="bi bi-x-circle me-2" style="color: #aaa;"></i> None
                            </a>
                        </div>
                    </div>
                    </span>
                    <span><i class="bi bi-star"></i></span>
                    <span><a href="{% url 'delete_task' el.id %}"><i class="bi bi-trash3"></i></a></span>
                </div>
            {% endfor %}
        {% endif %}
    </form>

</div>

<footer>
    © FLASK 2026
</footer>
</body>
